unds","name":"Tata Mutual Fund","rank":14,"search_id":"tata-mutual-funds"},{"logo_url":"https://assets-netstorage.groww.in/mf-assets/logos/edelweiss_groww.png","deep_link":"amc/edelweiss-mutual-funds","name":"Edelweiss Mutual Fund","rank":15,"search_id":"edelweiss-mutual-funds"},{"logo_url":"https://assets-netstorage.groww.in/mf-assets/logos/invesco_groww.png","deep_link":"amc/invesco-mutual-funds","name":"Invesco Mutual Fund","rank":16,"search_id":"invesco-mutual-funds"},{"logo_url":"https://assets-netstorage.groww.in/mf-assets/logos/sundaram_groww.png","deep_link":"amc/sundaram-mutual-funds","name":"Sundaram Mutual Fund","rank":17,"search_id":"sundaram-mutual-funds"},{"logo_url":"https://assets-netstorage.groww.in/mf-assets/logos/hdfc_groww.png","deep_link":"amc/hdfc-mutual-funds","name":"HDFC Mutual Fund","rank":2,"search_id":"hdfc-mutual-funds"},{"logo_url":"https://assets-netstorage.groww.in/mf-assets/logos/hsbc_groww.png","deep_link":"amc/hsbc-mutual-funds","name":"HSBC Mutual Fund","rank":21,"search_id":"hsbc-mutual-funds"},{"logo_url":"https://assets-netstorage.groww.in/mf-assets/logos/ppfas_groww.png","deep_link":"amc/ppfas-mutual-funds","name":"PPFAS Mutual Fund","rank":23,"search_id":"ppfas-mutual-funds"},{"logo_url":"https://assets-netstorage.groww.in/mf-assets/logos/barodabnpparibasmutualfund_groww.png","deep_link":"amc/baroda-bnp-paribas-mutual-funds","name":"Baroda BNP Paribas Mutual Fund","rank":25,"search_id":"baroda-bnp-paribas-mutual-funds"},{"logo_url":"https://assets-netstorage.groww.in/mf-assets/logos/quantum_groww.png","deep_link":"amc/quantum-mutual-funds","name":"Quantum Mutual Fund","rank":33,"search_id":"quantum-mutual-funds"},{"logo_url":"https://assets-netstorage.groww.in/mf-assets/logos/taurus_groww.png","deep_link":"amc/taurus-mutual-funds","name":"Taurus Mutual Fund","rank":37,"search_id":"taurus-mutual-funds"},{"logo_url":"https://assets-netstorage.groww.in/mf-assets/logos/shriram_groww.png","deep_link":"amc/shriram-mutual-funds","name":"Shriram Mutual Fund","rank":38,"search_id":"shriram-mutual-funds"},{"logo_url":"https://assets-netstorage.groww.in/mf-assets/logos/indiabulls_groww.png","deep_link":"amc/groww-mutual-funds","name":"Groww Mutual Fund","rank":41,"search_id":"groww-mutual-funds"},{"logo_url":"https://assets-netstorage.groww.in/mf-assets/logos/kotak_groww.png","deep_link":"amc/kotak-mahindra-mutual-funds","name":"Kotak Mahindra Mutual Fund","rank":5,"search_id":"kotak-mahindra-mutual-funds"},{"logo_url":"https://assets-netstorage.groww.in/mf-assets/logos/zerodha_groww.png","deep_link":"amc/zerodha-mutual-funds","name":"Zerodha Mutual Fund","rank":50,"search_id":"zerodha-mutual-funds"},{"logo_url":"https://assets-netstorage.groww.in/mf-assets/logos/axis_groww.png","deep_link":"amc/axis-mutual-funds","name":"Axis Mutual Fund","rank":7,"search_id":"axis-mutual-funds"},{"logo_url":"https://assets-netstorage.groww.in/mf-assets/logos/uti_groww.png","deep_link":"amc/uti-mutual-funds","name":"UTI Mutual Fund","rank":8,"search_id":"uti-mutual-funds"}],"content_list":[{"title":"What is an Asset Management Company?","content":"\u003cp\u003eAn Asset Management Company (AMC) is a firm that invests the funds pooled from individual investors in securities with the objective of optimal return for investors in exchange for a fee. AMC maintains the diversity of portfolio by investing in both high-risk and low-risk securities such as stock, debt, real- estate, shares, bonds, pension funds, etc.\u003c/p\u003e\n\u003cp\u003eFactors such as industry risk, market risk, return risk, political risk are considered before selecting any security to meet the return on investment targets. For example, a debt fund invests in bonds and risk-free Government bonds to maintain the minimum risk. On the other side, an equity-oriented fund will invest in shares and stocks with high risk and high return.\u003c/p\u003e","category":null,"sub_category":null},{"title":"How are the funds managed by an AMC?","content":"\u003cp\u003eBasically, when you invest with an AMC, you invest in a portfolio that AMC maintains for you. It is the responsibility of AMC to ensure an investor\u0026rsquo;s financial objective is met.AMC ensures this by the following means:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e1. Market Research and Analysis\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eTo build a portfolio for an investor the asset manager needs to do a lot of research on the market trends, macro-economic and micro-economic factors, political aspects. On the basis of this research, the appropriate securities are selected which will outperform the return expectations of the investors.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e2. Asset Allocation\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eOn the basis of market research and investor's financial objective, the asset manager allocates the funds to different assets. For example, a debt-oriented would invest just 20% in equity-oriented funds to keep the risk levels low. However, an equity-oriented fund would invest more than 70% in equity and rest in debt. A balanced fund would end up with just 60% in equity and 40% in debt to balance out return and risk.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e3. Creating a Portfolio\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eAfter research and analysis by analyst and decision of asset allocation are done, the asset manager on the basis of market findings creates a portfolio. Here the asset manager will take decisions like which security to sell, buy or hold for a period. The entire creation of portfolio is solely based on the market expertise of professionals, research and study and investment goals of the investor.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e4. Review of Performance\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eSince the fund of an investor is at stake, the performance measurement of the portfolio becomes very important. At every point, the asset manager has to justify a buy, sell or hold securities to investors and trustees. Every asset manager generally provide regular updates investor regarding sales, repurchases, NAV, Return on risk, portfolio changes and factors which might affect their portfolio.\u003c/p\u003e","category":null,"sub_category":null},{"title":"How do Asset Management Company functions?","content":"\u003cp\u003eAn AMC collects funds from different investors having different financial objectives. Now it invests such a large pool of funds in a very diversified portfolio and enjoys economies of scale, getting discounts on purchases. The return earned by the portfolio is then distributed among all the small retail investors.\u003c/p\u003e\n\u003cp\u003eLet us see how an \u003cstrong\u003eAsset Management Company functions\u003c/strong\u003e:\u003c/p\u003e\n\u003cp\u003eAn AMC collects funds from different investors having different financial objectives. Now it invests such a large pool of funds in a very diversified portfolio and enjoys economies of scale, getting discounts on purchases. The return earned by the portfolio is then distributed among all the small retail investors.\u003c/p\u003e\n\u003cp\u003eThe services provided by an AMC is charged either on a fixed basis or commission-based. Fixed Fee is nothing but a monthly or quarterly amount for maintaining the fund.\u003c/p\u003e\n\u003ch3\u003e\u003cstrong\u003ePoints to consider before you choose an AMC:\u003c/strong\u003e\u003c/h3\u003e\n\u003cp\u003eEvery AMC follows the investment objective of the schemes before investing and you must check on the track record and performance history of the investment schemes in the past during the ups and downs of the market.\u003c/p\u003e\n\u003cp\u003eIt is very important to know your AMC well before you invest your hard-earned money.\u003c/p\u003e\n\u003cp\u003eWhile selecting a fund house ensure that the below parameters met.\u003c/p\u003e\n\u003cp\u003ea. The reputation of an AMC- Reputation is built by consistency in performance over a few years say 5 years or 10 years. The investor must go through the performance through annual reports of schemes and AMC, reviews prevalent in the market and compliance report to SEBI, AMFI, and RBI.\u003c/p\u003e\n\u003cp\u003eb. Fund Manager's credibility- AMC work in parallel to its fund manager. The performance of the fund manager is now the performance of AMC then. Hence, an investor must look for past performance of the fund manager w.r.t managing the assets and funds.\u003c/p\u003e\n\u003cp\u003ec .Price and Value- Before selecting any fund, an investor must consider looking at the price of the fund and the value creation and return that the fund offer.\u003c/p\u003e\n\u003cp\u003ed .Fees and commission- Few AMCs charges a fixed fee for their services while others charge a commission on the return earned on the fund. A fixed is considered over commission because an investor will always know the outflow amount beforehand.\u003c/p\u003e\n\u003ch3\u003e\u003cstrong\u003eBodies Governing AMC's Operations\u003c/strong\u003e\u003c/h3\u003e\n\u003cp\u003eAMC performs under the supervision of the board of trustees. All the Asset Management Companies are governed by SEBI and AMFI.\u003c/p\u003e\n\u003cp\u003eSecurities and Exchange Board of India (SEBI) is the Indian Capital Market Regulator which governs and controls every AMC in India.\u003c/p\u003e\n\u003cp\u003eThe Association of Mutual Funds in India (AMFI) is a statutory body formed by mutual fund companies. AMFI was formed with the vision of a transparent and ethic driven financial industry. Every AMC must comply with the regulations led by AMFI.\u003c/p\u003e\n\u003cp\u003eBanks being sponsors are governed by RBI as well along with SEBI and AMFI.\u003c/p\u003e\n\u003cp\u003eLastly, all the regulatory bodies SEBI, AMFI, and RBI are governed by RBI.\u003c/p\u003e\n\u003ch3\u003e\u003cstrong\u003eGuidelines laid by SEBI, AMFI, and RBI for an AMC\u003c/strong\u003e\u003c/h3\u003e\n\u003cp\u003eSome of the mandatory practices and guidelines laid down by SEBI, AMFI, and RBI for a mutual fund company to follow:\u003c/p\u003e\n\u003cp\u003ea. The Chairman of an AMC cannot hold the position of Trustee of any mutual fund.\u003c/p\u003e\n\u003cp\u003eb. Key personnel of every AMC should not have indulged or convicted for any fraudulent or offensive acts.\u003c/p\u003e\n\u003cp\u003ec. AMC should not act as a Trustee of a mutual fund.\u003c/p\u003e\n\u003cp\u003ed. The net worth of an AMC must be not less than Rs. 10 crores.\u003c/p\u003e\n\u003cp\u003ee. Before making an investment in any of its schemes the company must disclose its intention to invest in the offer documents.\u003c/p\u003e\n\u003cp\u003ef. A quarterly report on activities and compliance of regulations must be submitted to the trustees.\u003c/p\u003e\n\u003ch3\u003e\u003cstrong\u003eReliability of AMC compared to Banks\u003c/strong\u003e\u003c/h3\u003e\n\u003cp\u003eWe often have the notion that mutual fund companies are not as reliable as Banks and the schemes offered by AMC is not as secure as a Fixed Deposit Interest. The fact is every mutual fund company or AMC is governed by RBI and Ministry of Finance just like any Bank. Hence, it is safe to invest with a \u003cstrong\u003emutual fund company or AMC.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eAn AMC is appointed by the sponsor and trustee to manage the pool of funds. AMC acts under the supervision of trustees who are governed by SEBI and AMFI. This ensures transparency, accountability, and objectivity. Hence one must go ahead and invest to optimize their wealth and save their taxes.\u003c/p\u003e","category":null,"sub_category":null}],"fund_categories":[{"name":"Fund Categories","categories":[{"name":"Others","deep_link":"https://groww.in/mutual-funds/other-funds","sub_categories":[{"name":"Infrastructure","deep_link":"https://groww.in/mutual-funds/other-funds/best-infrastructure-mutual-funds"},{"name":"PSU","deep_link":"https://groww.in/m arch_id":"hdfc-mutual-funds","contentList":[{"title":"HDFC Mutual Fund","content":"\u003cp\u003eHDFC Asset Management Company Ltd., or \u003cstrong\u003eHDFC Mutual Fund,\u003c/strong\u003e is currently the largest mutual fund and actively managed equity mutual fund in India. It is one of the most profitable asset management companies (AMC) in the country.\u003c/p\u003e\n\u003cp\u003e\u003cspan data-sheets-value=\"{\u0026quot;1\u0026quot;:2,\u0026quot;2\u0026quot;:\u0026quot;- The company\u0026nbsp;serviced\u0026nbsp;more than 75000 impaneled\u0026nbsp;distribution partners through 210 branches spread across more than 200 cities in India.\u0026quot;}\" data-sheets-userformat=\"{\u0026quot;2\u0026quot;:769,\u0026quot;3\u0026quot;:{\u0026quot;1\u0026quot;:0},\u0026quot;11\u0026quot;:3,\u0026quot;12\u0026quot;:0}\"\u003eThe company serviced more than 75000 empanelled distribution partners through 210 branches spread across more than 200 cities in India.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003eHDFC Asset Management Company Ltd. received approval to act as an AMC from SEBI back on 30 June 2000 under the registration number MF/044/00/6. It also offers portfolio management/non-binding investment advisory services since 18 September 2016 under the registration code PM /INP000000506 from SEBI.\u003c/p\u003e","category":null,"sub_category":null},{"title":"How to invest in HDFC Mutual Funds?","content":"\u003cp\u003eMutual Fund investment not only provides a lot of benefits but can also help in reducing the risk by investing in diverse portfolios. If you are looking to invest in HDFC Bank Mutual funds, such an investment can be made online as well as offline. The HDFC mutual fund application via offline mode can be done by filling up an investment application form. If you prefer to do it online, the prerequisites of how can you invest in HDFC MF online is given below.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe applicant should be an existing HDFC Bank account holder\u003c/li\u003e\n\u003cli\u003eThe applicant should be KYC Compliant\u003c/li\u003e\n\u003cli\u003eThe status of the Savings Bank Account needs to be Single or Either/Survivor\u003c/li\u003e\n\u003cli\u003eThe Account Opening Application Form needs to be signed by all the Bank Account Holders\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eHowever, you can also invest in HDFC Mutual Funds online on Groww; the steps for which are given below:\u003c/p\u003e\n\u003ch3\u003eHow to Invest in HDFC MF on Groww\u003c/h3\u003e\n\u003cp\u003eInvesting in \u003cstrong\u003eHDFC Bank Mutual Fund online\u003c/strong\u003e is a convenient process and you can do so by following the few simple steps mentioned below:\u003c/p\u003e\n\u003cp\u003eStep 1. Log-in to your Groww account or register if you don\u0026rsquo;t have one.\u003c/p\u003e\n\u003cp\u003eStep 2. Upload your identity proof documents (Aadhaar, Voter ID, PAN, Passport, Driving License, Central or State Government ID card, etc.)\u003c/p\u003e\n\u003cp\u003eStep 3. Upload your proof of address documents (any identity proof documents with your permanent address, etc.)\u003c/p\u003e\n\u003cp\u003eStep 4. Select the investment period of your preference.\u003c/p\u003e\n\u003cp\u003eStep 5. Choose your risk appetite - low, mid, or high.\u003c/p\u003e\n\u003cp\u003eStep 6. Choose your preferred \u003cstrong\u003eHDFC Bank Mutual Fund\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003eStep 7. Click on \u0026ldquo;Invest One Time\u0026rdquo; if you want to invest a lump sum amount or \u0026ldquo;Start SIP\u0026rdquo; if you want to invest via SIP.\u003c/p\u003e\n\u003cp\u003eThe \u003cstrong\u003eHDFC Mutual Fund in India\u003c/strong\u003e you have invested in will show in your Groww account within 3 to 4 working days.\u003c/p\u003e","category":"Tax","sub_category":null}],"key_information":{"fund_house":"HDFC Mutual Fund","asset_management_company":"HDFC Mutual Fund","amc_setup_date":null,"amc_incorporation_date":"1999-12-10T00:00","
