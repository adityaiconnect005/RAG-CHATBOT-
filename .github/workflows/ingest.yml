name: Daily Data Ingestion

on:
  schedule:
    # Runs at 03:45 UTC (09:15 IST) every day
    - cron: '45 3 * * *'
  workflow_dispatch:
    # Allows manual trigger
  repository_dispatch:
    types: [ping_cron]

jobs:
  scrape-and-ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r runtime/phase_4_0_scrape/requirements.txt
          pip install -r runtime/phase_4_1_normalize/requirements.txt
          pip install -r runtime/phase_4_2_embed/requirements.txt
          pip install -r runtime/phase_4_3_index/requirements.txt

      - name: Install Playwright Browsers
        run: python -m playwright install chromium

      - name: Run Phase 4.0 - Scraping Service
        run: |
          python runtime/phase_4_0_scrape/scrape.py
          
      - name: Run Phase 4.1 - Normalize
        run: |
          python runtime/phase_4_1_normalize/normalize.py
          
      - name: Run Inject Returns
        run: |
          python runtime/inject_returns.py
          
      - name: Run Phase 4.2 - Chunk & Embed
        run: |
          python runtime/phase_4_2_embed/embed.py
          
      - name: Run Phase 4.3 - Index (ChromaDB Cloud)
        env:
          CHROMA_HOST: ${{ secrets.CHROMA_HOST }}
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
        run: |
          python runtime/phase_4_3_index/index.py

      - name: Archive Raw HTML
        uses: actions/upload-artifact@v4
        with:
          name: raw-html-data
          path: data/raw/
          retention-days: 7

      - name: Commit Updated Structured Data and ChromaDB
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/structured/ data/chroma/
          # Only commit if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update daily mutual fund structured data [skip ci]"
            git push
          else
            echo "No changes to structured data to commit."
          fi
