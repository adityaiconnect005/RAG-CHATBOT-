services:
  - type: web
    name: rag-chatbot-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn runtime.phase_9_api.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: GROQ_API_KEY
        sync: false
      - key: CHROMA_HOST
        sync: false
      - key: CHROMA_API_KEY
        sync: false
